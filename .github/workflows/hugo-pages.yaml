name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "spec.md"
      - "icon.svg"
      - "docs/**"
      - "scripts/sync-hugo-content.sh"
      - ".gitmodules"
      - ".github/workflows/hugo-pages.yaml"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      HUGO_VERSION: 0.164.0
      TZ: Asia/Tokyo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Hugo
        shell: bash
        run: |
          set -euo pipefail

          curl -L \
            --output "${{ runner.temp }}/hugo.tar.gz" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz"

          mkdir -p "${HOME}/.local/hugo"

          tar \
            -C "${HOME}/.local/hugo" \
            -xf "${{ runner.temp }}/hugo.tar.gz"

          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Show Hugo version
        run: hugo version

      - name: Synchronize Markdown content
        run: ./scripts/sync-hugo-content.sh

      - name: Build Hugo site
        working-directory: ./docs
        run: |
          hugo build \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --cacheDir "${{ runner.temp }}/.cache/hugo"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs/public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
