name: publish
on:
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  setup:
    runs-on: ubuntu-latest
    # runs only the branch name starts with 'release/v' and the pull request is merged.
    if: startsWith(github.head_ref, 'releases/v') && github.event.pull_request.merged == true
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      appname: ${{ steps.vars.outputs.appname }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod

      - name: Git Tag name
        id: vars
        run: |
          # 後から参照するために、タグ名とアプリケーション名を出力しておく。
          # タグ名は、ブランチ名から 'releases/v' を取り除いたもの。
          # アプリケーション名は、リポジトリ名からオーナー名を取り除いたもの。
          # $GITHUB_OUTPUT に出力することで、後続のジョブから参照できるようになる。
          echo "tag=${GITHUB_HEAD_REF##*/v}" >> $GITHUB_OUTPUT
          #echo "appname=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT
          echo "appname=rust_encryption" >> "$GITHUB_OUTPUT"

      - name: Set git identity
        run: |
          # git tag を push するので、git のユーザ名とメールアドレスを設定しておく。
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and Push tag
        run: |
          # タグを作成して、リモートに push する。
          git tag v${{ steps.vars.outputs.tag }}
          git push origin v${{ steps.vars.outputs.tag }}

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # gh コマンドを使って、リリースを作成する。
          # draft として作成する。後続のジョブで、ドラフトを false にする。
          gh release create v${{ steps.vars.outputs.tag }} --verify-tag --generate-notes --title "Release v${{ steps.vars.outputs.tag }}" --draft

  publish:
    runs-on: ${{ matrix.os }}
    needs: setup
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            architecture: arm64
            os_name: linux
            artifact_name: ${{ needs.setup.outputs.appname }}
            ext: ''
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            architecture: amd64
            os_name: linux
            artifact_name: ${{ needs.setup.outputs.appname }}
            ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            architecture: arm64
            os_name: darwin
            artifact_name: ${{ needs.setup.outputs.appname }}
            ext: ''
          - os: macos-latest
            architecture: amd64
            os_name: darwin
            target: x86_64-apple-darwin
            artifact_name: ${{ needs.setup.outputs.appname }}
            ext: ''
    outputs:
      tag: ${{ needs.setup.outputs.tag }}
    steps:
      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod

      - name: Build binary and completions
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}
          cargo install cargo-zigbuild

          cargo zigbuild \
            --release \
            --target ${{ matrix.target }}

          rm -rf completions
          cargo run --release -- --completions

      - name: Create distribution files
        run: |
          APP_NAME="${{ needs.setup.outputs.appname }}"
          VERSION="${{ needs.setup.outputs.tag }}"
          ARCH="${{ matrix.architecture }}"
          OS_NAME="${{ matrix.os_name }}"

          ASSET_NAME="${APP_NAME}-${VERSION}_${ARCH}_${OS_NAME}"
          PACKAGE_DIR="dist/${ASSET_NAME}"

          mkdir -p "${PACKAGE_DIR}"

          cp \
            "target/${{ matrix.target }}/release/${APP_NAME}${{ matrix.ext }}" \
            "${PACKAGE_DIR}/"

           cp README.md LICENSE "${PACKAGE_DIR}/"
          cp -R completions "${PACKAGE_DIR}/"

          tar \
            -czf "dist/${ASSET_NAME}.tar.gz" \
            -C "${PACKAGE_DIR}" \
            .

          (
            cd dist
            shasum -a 256 \
              "${ASSET_NAME}.tar.gz" \
              > "${ASSET_NAME}.tar.gz.sha256"
          )

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # gh コマンドを使って、リリースにアセットをアップロードする。
          ASSET_NAME=${{ needs.setup.outputs.appname }}-${{ needs.setup.outputs.tag}}_${{ matrix.architecture }}_${{ matrix.os_name }}
          #gh release upload v${{ needs.setup.outputs.tag }} dist/${ASSET_NAME}.tar.gz
          gh release upload \
            "v${{ needs.setup.outputs.tag }}" \
            "dist/${ASSET_NAME}.tar.gz" \
            "dist/${ASSET_NAME}.tar.gz.sha256"
  container_image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    needs: publish

    steps:
      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hardened Images
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_USERNAME }}
          password: ${{ secrets.DHI_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        run: just container
  finalize:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    #needs: publish # publish ジョブが完了した後に実行される。
    needs: [publish, container_image]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod

      - name: Finalize release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # gh コマンドを使って、ドラフトを false にする（release が immutable であれば、これ以降変更できない）。
          gh release edit v${{ needs.publish.outputs.tag }} --draft=false
